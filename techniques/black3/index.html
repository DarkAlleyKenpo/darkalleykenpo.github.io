    <div id="video-popup-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;cursor:pointer" onclick="closeVideoPopup()">
        <div style="position:relative;width:80vw;max-width:960px;aspect-ratio:16/9;cursor:default" onclick="event.stopPropagation()">
            <iframe id="video-popup-iframe" src="" style="width:100%;height:100%;border:none;border-radius:4px" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
            <span onclick="closeVideoPopup()" style="position:absolute;top:-2rem;right:0;color:#fff;font-size:1.5rem;cursor:pointer;line-height:1">&times;</span>
        </div>
    </div>
    <script>
    function openVideoPopup(id) {
        var overlay = document.getElementById('video-popup-overlay');
        document.getElementById('video-popup-iframe').src = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(id) + '?autoplay=1';
        overlay.style.display = 'flex';
    }
    function closeVideoPopup() {
        var overlay = document.getElementById('video-popup-overlay');
        overlay.style.display = 'none';
        document.getElementById('video-popup-iframe').src = '';
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeVideoPopup(); });
    </script>
